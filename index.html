<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="تهنئة عيد الفطر المبارك 2026 - أنشئ تهنئة شخصية وشاركها">

<title>تهنئة عيد الفطر</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="stars"></div>

<div class="card">

<h1><span class="moving-moon">🌙</span> تهنئة عيد الفطر</h1>

<p id="countdown"></p>

<input id="name" type="text" placeholder="اكتب الاسم">

<button onclick="createMessage()">إنشاء التهنئة</button>

<p id="result"></p>

<a id="whatsapp" class="btn whatsapp" target="_blank">مشاركة واتساب</a>

<a id="messenger" class="btn messenger" target="_blank">مشاركة مسنجر</a>
<br>
<button onclick="copyMessage()" class="copy-btn">
نسخ التهنئة
</button>

</div>

<footer class="signature">
<p id="signature"></p>
</footer>

<audio id="takbeer" autoplay>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_0c26e37b69.mp3?filename=eid-takbeer-11000.mp3">
</audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script src="scrip.js"></script>

</body>
</html>
